# docker-compose pour le développement local conteneurisé du site Maintenant!.
#
# Service `web` : lance le serveur de dev Next.js dans un conteneur Node 20, en
# lisant les variables depuis `.env.local` (à créer depuis `.env.example`). Le
# code est monté en volume (hot reload). Le site tape sur Supabase DISTANT.
#
#   docker compose up            # http://localhost:3000
#   docker compose down
#
# Pour un build de PRODUCTION conteneurisé, utiliser le Dockerfile :
#   docker build -t maintenant \
#     --build-arg NEXT_PUBLIC_SUPABASE_URL=... \
#     --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY=... .
#   docker run --env-file .env.local -p 3000:3000 maintenant
#
# Pour un Supabase 100 % local (Postgres + Auth en conteneurs), voir docs/DOCKER.md
# (CLI `supabase start`, géré hors de ce compose).

services:
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env.local
    environment:
      # Dans un conteneur, Next doit écouter sur toutes les interfaces.
      HOSTNAME: '0.0.0.0'
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      # node_modules en volume anonyme : ne pas écraser avec l'hôte.
      - /app/node_modules
